model_path: null
model_device: auto

# Output directory
output_dir: qwen3-8b

# Calibration data parameters
max_length: 2048
num_calibration_samples: 1024
calibration_strategy: drop_rand
calibration_seed: 0
calibration_batch_size: 64

# JointQ parameters
jointq:
  num_layers: null
  bits: [4, 3]
  group_size: [128, null]
  symmetric: true
  batch_size: null
  log_level: 0
  device: null
  regularization_lambda: 0.2
  actorder: false
  ils_enabled: false
  ils_num_iterations: 10
  ils_num_clones: 8
  ils_num_channels: null

# Evaluation
calc_ppl: true
calc_original_ppl: true
calc_acc: true
calc_original_acc: true

# Hydra
hydra:
  run:
    dir: ${output_dir}
  job:
    chdir: true
